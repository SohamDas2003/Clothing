{% extends 'clothing/base.html' %} {% block body %}


<br><br><br><br><br><br>
<center>
<div class="card text" style="width:40%">
    <div class="card-header">Login</div>
        <div class="card-body">
            <p class="card-text">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label
                            for="user"
                            class="form-label"
                            >Username</label
                        >
                        <input
                            type="text"
                            class="form-control"
                            id="user"
                            name="username" />
                    </div>
                    <div class="mb-3">
                        <label
                            for="pass"
                            class="form-label"
                            >Password</label
                        >
                        <input
                            type="password"
                            class="form-control"
                            id="pass"
                            name="password" />
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">
                        Submit
                    </button>
                </form>
            </p>
        </div>
</div>
</center>
{% endblock %}
