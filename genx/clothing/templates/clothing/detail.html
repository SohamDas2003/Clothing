{% extends 'clothing/base.html' %} {% block body %}

<div
	class="card mb-3"
	style="max-width: 540px">
	<div class="row g-0">
		<div class="col-md-4">
			<img
				src="{{ item.item_image }}"
				class="img-fluid rounded-start"
				alt="..." />
		</div>
		<div class="col-md-8">
			<div class="card-body">
				<h5 class="card-title">{{ item.item_name }}</h5>
				<p class="card-text">{{ item.item_desc }}</p>
				<p class="card-text">
					<small class="text-body-secondary">₹{{ item.item_price }}</small>
				</p>
			</div>
		</div>
	</div>
</div>
{% endblock %}
